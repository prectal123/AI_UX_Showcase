<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivo - 가장 쉬운 음식 배달</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Section -->
        <header id="main-header">
            <div class="location-selector" role="button" aria-label="배달 주소 변경">
                <span class="location-label">배달 주소</span>
                <span class="location-current">서울 강남구 테헤란로 123 ▼</span>
            </div>
            <button class="nav-icon" aria-label="알림">🔔</button>
        </header>

        <!-- Main Content Area (Dynamic Content) -->
        <main id="app-content">
            <!-- Home View will be rendered here by app.js -->
            <div class="shimmer-loading">
                <div class="restaurant-card shimmer" style="height: 250px;"></div>
                <div class="restaurant-card shimmer" style="height: 250px;"></div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-home" aria-label="홈">
                <span class="nav-icon">🏠</span>
                <span>홈</span>
            </button>
            <button class="nav-item" id="nav-search" aria-label="검색">
                <span class="nav-icon">🔍</span>
                <span>검색</span>
            </button>
            <button class="nav-item" id="nav-orders" aria-label="주문 내역">
                <span class="nav-icon">📋</span>
                <span>주문</span>
            </button>
            <button class="nav-item" id="nav-profile" aria-label="마이페이지">
                <span class="nav-icon">👤</span>
                <span>내 정보</span>
            </button>
        </nav>

        <!-- Floating Cart Button (Hidden by default) -->
        <button id="cart-btn" class="cart-floating-btn hidden">
            <span>장바구니 보기</span>
            <span id="cart-total">0원</span>
        </button>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>

</body>
</html>
