<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity Video - Premium Sharing Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --sidebar-width: 240px;
            --header-height: 64px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Styles */
        .header {
            height: var(--header-height);
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
        }

        .search-container {
            display: flex;
            align-items: center;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 0.25rem 0.5rem 0.25rem 1.25rem;
            width: 500px;
            transition: border-color 0.2s;
        }

        .search-container:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .search-container input {
            background: none;
            border: none;
            outline: none;
            flex: 1;
            font-size: 0.95rem;
            padding: 0.5rem 0;
        }

        .search-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            color: var(--text-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.6rem;
            border-radius: 50%;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .icon-btn:hover {
            background-color: var(--border);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .user-avatar:hover {
            border-color: var(--primary);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 1rem 0;
            transition: transform 0.3s ease, width 0.3s ease;
            overflow-y: auto;
        }

        .sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
            border-right: none;
        }

        .side-nav {
            display: flex;
            flex-direction: column;
            padding: 0 0.75rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border: none;
            background: none;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 500;
            text-align: left;
            transition: background-color 0.2s, color 0.2s;
            width: 100%;
            white-space: nowrap;
        }

        .nav-item:hover {
            background-color: var(--bg-main);
        }

        .nav-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary);
        }

        .nav-divider {
            margin: 1rem 0.75rem;
            border: none;
            border-top: 1px solid var(--border);
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .view-header {
            margin-bottom: 2rem;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .video-card {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-card:hover {
            transform: translateY(-4px);
        }

        .thumbnail-container {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16/9;
            background-color: #eee;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .video-info {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
        }

        .video-details h3 {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .channel-name {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .video-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Video Player Page */
        .player-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        .main-player {
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder {
            color: white;
            text-align: center;
            z-index: 2;
        }

        .video-placeholder i {
            width: 64px;
            height: 64px;
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        .player-info {
            margin-top: 1.5rem;
        }

        .player-info h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .player-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .btn-secondary {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--border);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #d1d5db;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary.subscribed {
            background-color: var(--border);
            color: var(--text-main);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .channel-text h4 {
            font-weight: 600;
        }

        .channel-text p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .video-description {
            background-color: var(--border);
            padding: 1rem;
            border-radius: var(--radius);
            margin-top: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Suggested Videos */
        .suggested-videos {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .suggested-item {
            display: flex;
            gap: 0.75rem;
            cursor: pointer;
        }

        .suggested-thumb {
            width: 160px;
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #eee;
        }

        .suggested-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .suggested-details h4 {
            font-size: 0.9rem;
            font-weight: 600;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .suggested-details p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Empty State */
        .empty-state-container {
            text-align: center;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        /* Loader */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--border);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            background-color: var(--text-main);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal {
            background-color: var(--bg-card);
            width: 90%;
            max-width: 500px;
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .player-container {
                grid-template-columns: 1fr;
            }
            .search-container {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100%;
                z-index: 90;
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .search-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Navigation Bar -->
        <header class="header">
            <div class="header-left">
                <button id="menu-toggle" class="icon-btn" aria-label="Toggle Menu">
                    <i data-lucide="menu"></i>
                </button>
                <div class="logo" id="nav-home">
                    <i data-lucide="play-circle" class="logo-icon"></i>
                    <span>Clarity</span>
                </div>
            </div>
            <div class="header-center">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search videos...">
                    <button class="search-btn" id="search-btn">
                        <i data-lucide="search"></i>
                    </button>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" id="nav-upload" title="Upload Video">
                    <i data-lucide="video"></i>
                </button>
                <button class="icon-btn" id="nav-notifications" title="Notifications">
                    <i data-lucide="bell"></i>
                </button>
                <div class="user-avatar" id="nav-profile">
                    <img src="https://i.pravatar.cc/150?u=me" alt="User Profile">
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <nav class="side-nav">
                    <button class="nav-item active" data-view="home">
                        <i data-lucide="home"></i>
                        <span>Home</span>
                    </button>
                    <button class="nav-item" data-view="trending">
                        <i data-lucide="trending-up"></i>
                        <span>Trending</span>
                    </button>
                    <button class="nav-item" data-view="subscriptions">
                        <i data-lucide="users"></i>
                        <span>Subscriptions</span>
                    </button>
                    <hr class="nav-divider">
                    <button class="nav-item" data-view="library">
                        <i data-lucide="library"></i>
                        <span>Library</span>
                    </button>
                    <button class="nav-item" data-view="history">
                        <i data-lucide="history"></i>
                        <span>History</span>
                    </button>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="content" id="main-content">
                <!-- Initial Loader -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </main>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Modals -->
        <div id="modal-container" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modal-title">Modal Title</h3>
                    <button id="modal-close" class="icon-btn"><i data-lucide="x"></i></button>
                </div>
                <div class="modal-body" id="modal-body">
                    <!-- Modal content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mock Data
        const mockVideos = [
            {
                id: 'v1',
                title: 'Exploring the Swiss Alps in 4K',
                thumbnail: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=1000',
                duration: '12:45',
                views: '1.2M views',
                timestamp: '2 days ago',
                channel: {
                    name: 'Nature Wanderer',
                    avatar: 'https://i.pravatar.cc/150?u=nature',
                    subscribers: '850K'
                },
                description: 'Join us on a breathtaking journey through the Swiss Alps. We explore the hidden gems and popular spots in stunning 4K resolution.',
                comments: [
                    { user: 'TravelBug', text: 'The scenery is absolutely stunning!', time: '1 hour ago' },
                    { user: 'MountainLover', text: 'I need to visit this place next summer.', time: '5 hours ago' }
                ]
            },
            {
                id: 'v2',
                title: 'Modern Web Design Trends 2026',
                thumbnail: 'https://images.unsplash.com/photo-1547658719-da2b51169166?auto=format&fit=crop&q=80&w=1000',
                duration: '08:20',
                views: '450K views',
                timestamp: '1 week ago',
                channel: {
                    name: 'Design Mastery',
                    avatar: 'https://i.pravatar.cc/150?u=design',
                    subscribers: '1.2M'
                },
                description: 'Looking into the future of web design. From glassmorphism to bento grids, we cover it all.',
                comments: [
                    { user: 'UXLearner', text: 'Very insightful! Thanks for sharing.', time: '3 days ago' }
                ]
            },
            {
                id: 'v3',
                title: 'Delicious Homemade Pasta Recipe',
                thumbnail: 'https://images.unsplash.com/photo-1473093226795-af9932fe5856?auto=format&fit=crop&q=80&w=1000',
                duration: '15:10',
                views: '2.5M views',
                timestamp: '1 month ago',
                channel: {
                    name: 'Chef At Home',
                    avatar: 'https://i.pravatar.cc/150?u=chef',
                    subscribers: '3.4M'
                },
                description: 'Learn how to make authentic Italian pasta from scratch. It is easier than you think!',
                comments: []
            },
            {
                id: 'v4',
                title: 'Cyberpunk 2077: Phantom Liberty Gameplay',
                thumbnail: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=1000',
                duration: '22:30',
                views: '890K views',
                timestamp: '5 days ago',
                channel: {
                    name: 'Gaming Pro',
                    avatar: 'https://i.pravatar.cc/150?u=gaming',
                    subscribers: '2.1M'
                },
                description: 'A deep dive into the expansion content. No spoilers!',
                comments: []
            },
            {
                id: 'v5',
                title: 'How to Build an AI App with React',
                thumbnail: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=1000',
                duration: '18:55',
                views: '120K views',
                timestamp: '3 hours ago',
                channel: {
                    name: 'Code Wizards',
                    avatar: 'https://i.pravatar.cc/150?u=code',
                    subscribers: '45K'
                },
                description: 'Step-by-step guide to integrating AI models into your React applications.',
                comments: []
            },
            {
                id: 'v6',
                title: 'Urban Photography Tips for Beginners',
                thumbnail: 'https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=1000',
                duration: '10:05',
                views: '300K views',
                timestamp: '2 weeks ago',
                channel: {
                    name: 'Lens Focus',
                    avatar: 'https://i.pravatar.cc/150?u=lens',
                    subscribers: '120K'
                },
                description: 'Capture the city like a pro with these simple yet effective tips.',
                comments: []
            }
        ];

        // Application State
        const state = {
            currentView: 'home',
            searchQuery: '',
            selectedVideo: null,
            subscribedChannels: new Set(),
            history: [],
            isSidebarCollapsed: false
        };

        // DOM Elements
        const mainContent = document.getElementById('main-content');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menu-toggle');
        const navHome = document.getElementById('nav-home');
        const toastContainer = document.getElementById('toast-container');
        const modalContainer = document.getElementById('modal-container');
        const modalClose = document.getElementById('modal-close');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');

        // Initialization
        function init() {
            renderHome();
            setupEventListeners();
            lucide.createIcons();
        }

        // Navigation Functions
        function navigate(view, params = {}) {
            showLoader();
            state.currentView = view;
            
            // Simulate network delay for "Clarity" feedback
            setTimeout(() => {
                switch (view) {
                    case 'home':
                        renderHome();
                        break;
                    case 'video':
                        state.selectedVideo = params.video;
                        renderVideoPlayer(params.video);
                        break;
                    case 'search':
                        renderSearchResults(params.query);
                        break;
                    case 'trending':
                        renderTrending();
                        break;
                    case 'subscriptions':
                        renderSubscriptions();
                        break;
                    case 'library':
                        renderLibrary();
                        break;
                    case 'history':
                        renderHistory();
                        break;
                }
                updateSidebarActiveState(view);
                lucide.createIcons();
                mainContent.scrollTop = 0;
            }, 400);
        }

        // Rendering Functions
        function renderHome() {
            mainContent.innerHTML = `
                <div class="view-header">
                    <h2>Recommended for You</h2>
                </div>
                <div class="video-grid">
                    ${mockVideos.map(video => createVideoCard(video)).join('')}
                </div>
            `;
            attachVideoCardListeners();
        }

        function renderSearchResults(query) {
            const filtered = mockVideos.filter(v => 
                v.title.toLowerCase().includes(query.toLowerCase()) || 
                v.channel.name.toLowerCase().includes(query.toLowerCase())
            );

            mainContent.innerHTML = `
                <div class="view-header">
                    <h2>Search results for "${query}"</h2>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">${filtered.length} videos found</p>
                </div>
                <div class="video-grid">
                    ${filtered.length > 0 ? filtered.map(v => createVideoCard(v)).join('') : '<p class="empty-state">No videos found matching your search.</p>'}
                </div>
            `;
            attachVideoCardListeners();
        }

        function renderTrending() {
            mainContent.innerHTML = `
                <div class="view-header">
                    <h2>Trending Videos</h2>
                </div>
                <div class="video-grid">
                    ${[...mockVideos].sort((a, b) => b.views.localeCompare(a.views)).map(v => createVideoCard(v)).join('')}
                </div>
            `;
            attachVideoCardListeners();
        }

        function renderSubscriptions() {
            mainContent.innerHTML = `
                <div class="view-header">
                    <h2>Your Subscriptions</h2>
                </div>
                <div class="empty-state-container">
                    <i data-lucide="users" style="width: 48px; height: 48px; color: var(--text-muted);"></i>
                    <h3>Stay updated with your favorite creators</h3>
                    <p>New videos from channels you subscribe to will show up here.</p>
                    <button class="btn-primary" style="margin-top: 1rem;" onclick="window.location.reload()">Explore Channels</button>
                </div>
            `;
        }

        function renderLibrary() {
            mainContent.innerHTML = `
                <div class="view-header">
                    <h2>Your Library</h2>
                </div>
                <div class="empty-state-container">
                    <i data-lucide="library" style="width: 48px; height: 48px; color: var(--text-muted);"></i>
                    <h3>Your collection is empty</h3>
                    <p>Save videos to watch them later or create playlists.</p>
                </div>
            `;
        }

        function renderHistory() {
            const historyVideos = state.history.map(id => mockVideos.find(v => v.id === id)).filter(Boolean);
            
            mainContent.innerHTML = `
                <div class="view-header">
                    <h2>Watch History</h2>
                </div>
                <div class="video-grid">
                    ${historyVideos.length > 0 ? historyVideos.map(v => createVideoCard(v)).join('') : `
                        <div class="empty-state-container">
                            <i data-lucide="history" style="width: 48px; height: 48px; color: var(--text-muted);"></i>
                            <p>No history yet. Start watching!</p>
                        </div>
                    `}
                </div>
            `;
            attachVideoCardListeners();
        }

        function renderVideoPlayer(video) {
            // Add to history
            if (!state.history.includes(video.id)) {
                state.history.unshift(video.id);
            }

            const isSubscribed = state.subscribedChannels.has(video.channel.name);
            const suggested = mockVideos.filter(v => v.id !== video.id);

            mainContent.innerHTML = `
                <div class="player-container">
                    <div class="main-player">
                        <div class="video-wrapper">
                            <img src="${video.thumbnail}" style="position: absolute; width:100%; height:100%; object-fit:cover; opacity: 0.3; filter: blur(20px);">
                            <div class="video-placeholder">
                                <i data-lucide="play-circle"></i>
                                <p>Video playback is simulated for this prototype.</p>
                                <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 0.5rem;">Streaming: ${video.title}</p>
                            </div>
                        </div>
                        
                        <div class="player-info">
                            <h1>${video.title}</h1>
                            <div class="player-actions">
                                <div class="channel-info">
                                    <img src="${video.channel.avatar}" class="channel-avatar">
                                    <div class="channel-text">
                                        <h4>${video.channel.name}</h4>
                                        <p>${video.channel.subscribers} subscribers</p>
                                    </div>
                                    <button class="btn-primary ${isSubscribed ? 'subscribed' : ''}" id="subscribe-btn">
                                        ${isSubscribed ? 'Subscribed' : 'Subscribe'}
                                    </button>
                                </div>
                                <div class="action-btns">
                                    <button class="btn-secondary" id="like-btn"><i data-lucide="thumbs-up"></i> Like</button>
                                    <button class="btn-secondary" id="share-btn"><i data-lucide="share-2"></i> Share</button>
                                    <button class="btn-secondary"><i data-lucide="more-horizontal"></i></button>
                                </div>
                            </div>
                            <div class="video-description">
                                <p><strong>${video.views} • ${video.timestamp}</strong></p>
                                <p style="margin-top: 0.5rem;">${video.description}</p>
                            </div>
                            
                            <div class="comments-section" style="margin-top: 2rem;">
                                <h3>Comments</h3>
                                <div class="comment-input" style="display: flex; gap: 1rem; margin: 1.5rem 0;">
                                     <img src="https://i.pravatar.cc/150?u=me" class="channel-avatar">
                                     <div style="flex:1; position: relative;">
                                        <input type="text" id="new-comment" placeholder="Add a comment..." style="width: 100%; border:none; border-bottom: 2px solid var(--border); outline:none; padding: 0.5rem 0; font-family: inherit; transition: border-color 0.2s;">
                                     </div>
                                </div>
                                <div id="comments-list">
                                    ${video.comments.map(c => `
                                        <div class="comment" style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                                            <img src="https://i.pravatar.cc/150?u=${c.user}" class="channel-avatar">
                                            <div>
                                                <p><strong>@${c.user}</strong> <span style="font-size: 0.8rem; color: var(--text-muted);">${c.time}</span></p>
                                                <p style="margin-top: 0.25rem;">${c.text}</p>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <aside class="suggested-videos">
                        <h3 style="margin-bottom: 1rem;">Up Next</h3>
                        ${suggested.map(v => `
                            <div class="suggested-item" data-id="${v.id}">
                                <div class="suggested-thumb">
                                    <img src="${v.thumbnail}" alt="${v.title}">
                                </div>
                                <div class="suggested-details">
                                    <h4>${v.title}</h4>
                                    <p>${v.channel.name}</p>
                                    <p>${v.views} • ${v.timestamp}</p>
                                </div>
                            </div>
                        `).join('')}
                    </aside>
                </div>
            `;

            // Attach listeners for player page
            const subscribeBtn = document.getElementById('subscribe-btn');
            subscribeBtn.addEventListener('click', () => {
                if (state.subscribedChannels.has(video.channel.name)) {
                    state.subscribedChannels.delete(video.channel.name);
                    subscribeBtn.textContent = 'Subscribe';
                    subscribeBtn.classList.remove('subscribed');
                    showToast(`Unsubscribed from ${video.channel.name}`);
                } else {
                    state.subscribedChannels.add(video.channel.name);
                    subscribeBtn.textContent = 'Subscribed';
                    subscribeBtn.classList.add('subscribed');
                    showToast(`Subscribed to ${video.channel.name}!`);
                }
            });

            document.getElementById('like-btn').addEventListener('click', () => {
                showToast('Added to liked videos');
            });

            document.getElementById('share-btn').addEventListener('click', () => {
                showModal('Share Video', `
                    <p>Copy this link to share the video:</p>
                    <div style="background: var(--bg-main); padding: 0.75rem; border-radius: 8px; margin-top: 1rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border);">
                        <code style="word-break: break-all;">clarity-video.app/watch?v=${video.id}</code>
                        <button class="btn-secondary" style="margin-left: 1rem;" onclick="alert('Link copied to clipboard!')">Copy</button>
                    </div>
                `);
            });

            document.querySelectorAll('.suggested-item').forEach(item => {
                item.addEventListener('click', () => {
                    const nextVideo = mockVideos.find(v => v.id === item.dataset.id);
                    navigate('video', { video: nextVideo });
                });
            });

            const commentInput = document.getElementById('new-comment');
            commentInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && commentInput.value.trim()) {
                    showToast('Comment posted successfully!');
                    commentInput.value = '';
                }
            });
            
            lucide.createIcons();
        }

        // Helpers
        function createVideoCard(video) {
            return `
                <div class="video-card" data-id="${video.id}">
                    <div class="thumbnail-container">
                        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                        <span class="duration">${video.duration}</span>
                    </div>
                    <div class="video-info">
                        <img src="${video.channel.avatar}" class="channel-avatar" alt="${video.channel.name}">
                        <div class="video-details">
                            <h3>${video.title}</h3>
                            <span class="channel-name">${video.channel.name}</span>
                            <span class="video-meta">${video.views} • ${video.timestamp}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function attachVideoCardListeners() {
            document.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', () => {
                    const video = mockVideos.find(v => v.id === card.dataset.id);
                    navigate('video', { video });
                });
            });
        }

        function showLoader() {
            mainContent.innerHTML = `
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            `;
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(title, content) {
            modalTitle.textContent = title;
            modalBody.innerHTML = content;
            modalContainer.classList.remove('hidden');
            lucide.createIcons();
        }

        function updateSidebarActiveState(view) {
            document.querySelectorAll('.nav-item').forEach(item => {
                if (item.dataset.view === view) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // Event Listeners
        function setupEventListeners() {
            // Menu Toggle
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
                sidebar.classList.toggle('active'); // For mobile
            });

            // Home Navigation
            navHome.addEventListener('click', () => navigate('home'));

            // Sidebar Navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const view = item.dataset.view;
                    navigate(view);
                });
            });

            // Search
            searchBtn.addEventListener('click', () => {
                const query = searchInput.value.trim();
                if (query) navigate('search', { query });
            });

            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (query) navigate('search', { query });
                }
            });

            // Upload (Mock)
            document.getElementById('nav-upload').addEventListener('click', () => {
                showModal('Upload Video', `
                    <div style="text-align: center; padding: 2rem;">
                        <i data-lucide="upload-cloud" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;"></i>
                        <p>Drag and drop video files to upload</p>
                        <button class="btn-primary" style="margin-top: 1.5rem;" onclick="alert('Feature simulated: File selection triggered.')">Select Files</button>
                    </div>
                `);
            });

            // Notifications (Mock)
            document.getElementById('nav-notifications').addEventListener('click', () => {
                showToast('You have no new notifications');
            });

            // Profile (Mock)
            document.getElementById('nav-profile').addEventListener('click', () => {
                showModal('Your Profile', `
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                        <img src="https://i.pravatar.cc/150?u=me" class="channel-avatar" style="width: 64px; height: 64px;">
                        <div>
                            <h4>Demo User</h4>
                            <p style="color: var(--text-muted);">demo@clarity.app</p>
                        </div>
                    </div>
                    <button class="btn-secondary" style="width: 100%; text-align: left; margin-bottom: 0.5rem; padding: 0.75rem 1rem;"><i data-lucide="user"></i> Manage Account</button>
                    <button class="btn-secondary" style="width: 100%; text-align: left; padding: 0.75rem 1rem;"><i data-lucide="settings"></i> Settings</button>
                `);
            });

            // Modal Close
            modalClose.addEventListener('click', () => {
                modalContainer.classList.add('hidden');
            });

            modalContainer.addEventListener('click', (e) => {
                if (e.target === modalContainer) {
                    modalContainer.classList.add('hidden');
                }
            });
        }

        // Start the app
        window.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
