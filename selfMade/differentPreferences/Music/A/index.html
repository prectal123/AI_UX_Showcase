<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody - Accessible Music Sharing</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Accessible Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Main Content Area -->
        <main class="content-area" id="main-content">
            
            <!-- Home View -->
            <section id="home-view" class="view active">
                <header class="section-header">
                    <h1>Melody</h1>
                    <button class="control-btn" aria-label="Settings" onclick="alert('Settings feature coming soon in this prototype!')">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </header>

                <h3>Recommended for You</h3>
                <div class="song-list" id="recommended-list">
                    <!-- Songs will be injected here -->
                </div>

                <div class="section-header">
                    <h3>New Releases</h3>
                </div>
                <div class="song-list" id="new-releases-list">
                    <!-- Songs will be injected here -->
                </div>
            </section>

            <!-- Search View -->
            <section id="search-view" class="view">
                <h1>Search</h1>
                <div class="search-bar-container" style="margin: var(--spacing-md) 0;">
                    <div style="background: var(--bg-tertiary); padding: var(--spacing-md); border-radius: 12px; display: flex; align-items: center; gap: 12px; border: 2px solid transparent;" id="search-input-box">
                        <i class="fa-solid fa-magnifying-glass" style="color: var(--text-secondary);"></i>
                        <input type="text" id="search-input" placeholder="Artists, songs, or podcasts" style="background: none; border: none; color: white; flex: 1; font-size: 18px; outline: none;">
                    </div>
                </div>
                <div id="search-results">
                    <p style="color: var(--text-secondary); text-align: center; margin-top: 40px;">Search for your favorite music.</p>
                </div>
            </section>

            <!-- Library View -->
            <section id="library-view" class="view">
                <header class="section-header">
                    <h1>Your Library</h1>
                    <button class="control-btn" aria-label="Add Playlist" onclick="alert('Playlist creation is a future feature!')">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </header>
                <div class="filter-chips" style="display: flex; gap: 12px; margin-bottom: 24px; overflow-x: auto;">
                    <button style="padding: 8px 16px; border-radius: 20px; background: var(--accent-primary); border: none; color: white; font-weight: 700;">Playlists</button>
                    <button style="padding: 8px 16px; border-radius: 20px; background: var(--bg-tertiary); border: none; color: white; font-weight: 700;">Artists</button>
                    <button style="padding: 8px 16px; border-radius: 20px; background: var(--bg-tertiary); border: none; color: white; font-weight: 700;">Albums</button>
                </div>
                <div id="liked-songs-list">
                    <!-- Liked songs will appear here -->
                </div>
            </section>

        </main>

        <!-- Mini Player -->
        <div class="mini-player" id="mini-player" onclick="toggleFullPlayer(true)">
            <img src="https://picsum.photos/seed/music1/200" alt="" class="mini-player-art" id="mini-art">
            <div class="mini-player-info">
                <div class="mini-player-title" id="mini-title">Not Playing</div>
                <div class="mini-player-artist" id="mini-artist-name">Select a song</div>
            </div>
            <div class="mini-player-controls">
                <button class="control-btn" id="mini-play-pause" onclick="event.stopPropagation(); togglePlayPause()">
                    <i class="fa-solid fa-play"></i>
                    <span class="sr-only">Play</span>
                </button>
                <button class="control-btn" onclick="event.stopPropagation(); nextSong()">
                    <i class="fa-solid fa-forward-step"></i>
                    <span class="sr-only">Next</span>
                </button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchView('home')" id="nav-home">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="switchView('search')" id="nav-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </button>
            <button class="nav-item" onclick="switchView('library')" id="nav-library">
                <i class="fa-solid fa-lines-leaning"></i>
                <span>Library</span>
            </button>
        </nav>

        <!-- Full Player View -->
        <div class="full-player" id="full-player">
            <div class="player-header">
                <button class="back-btn" onclick="toggleFullPlayer(false)" aria-label="Close Player">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div style="font-weight: 700; font-size: 16px; color: var(--text-secondary);">NOW PLAYING</div>
                <button class="control-btn" aria-label="More Options">
                    <i class="fa-solid fa-ellipsis"></i>
                </button>
            </div>

            <div class="player-art-container">
                <img src="https://picsum.photos/seed/music1/600" alt="Album Art" class="player-art" id="full-art">
            </div>

            <div class="player-info">
                <h2 class="player-title" id="full-title">Song Title</h2>
                <div class="player-artist" id="full-artist">Artist Name</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar" onclick="seek(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                    <div class="progress-handle" id="progress-handle"></div>
                </div>
                <div class="time-stamps">
                    <span id="current-time">0:00</span>
                    <span id="duration-time">3:45</span>
                </div>
            </div>

            <div class="player-main-controls">
                <button class="control-btn" style="font-size: 32px;" onclick="toggleShuffle()" id="shuffle-btn" aria-label="Shuffle">
                    <i class="fa-solid fa-shuffle"></i>
                </button>
                <button class="control-btn" style="font-size: 40px;" onclick="prevSong()" aria-label="Previous">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <button class="play-pause-btn" id="full-play-pause" onclick="togglePlayPause()" aria-label="Play">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button class="control-btn" style="font-size: 40px;" onclick="nextSong()" aria-label="Next">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
                <button class="control-btn" style="font-size: 32px;" onclick="toggleRepeat()" id="repeat-btn" aria-label="Repeat">
                    <i class="fa-solid fa-repeat"></i>
                </button>
            </div>

            <div class="secondary-controls">
                <button class="control-btn" onclick="toggleLike()" id="like-btn" aria-label="Like">
                    <i class="fa-regular fa-heart"></i>
                </button>
                <button class="control-btn" onclick="openShareModal()" aria-label="Share">
                    <i class="fa-solid fa-share-nodes"></i>
                </button>
                <button class="control-btn" onclick="alert('Lyrics feature is in development!')" aria-label="Lyrics">
                    <i class="fa-solid fa-quote-right"></i>
                </button>
            </div>
        </div>

        <!-- Share Modal -->
        <div class="modal-overlay" id="share-modal">
            <div class="modal-content">
                <h2 class="modal-title">Share this Song</h2>
                <div class="share-options">
                    <button class="share-btn" onclick="performShare('Twitter')">
                        <i class="fa-brands fa-twitter"></i>
                        <span>Twitter</span>
                    </button>
                    <button class="share-btn" onclick="performShare('Instagram')">
                        <i class="fa-brands fa-instagram"></i>
                        <span>Instagram</span>
                    </button>
                    <button class="share-btn" onclick="performShare('Messages')">
                        <i class="fa-solid fa-comment-dots"></i>
                        <span>Messages</span>
                    </button>
                    <button class="share-btn" onclick="performShare('Copy Link')">
                        <i class="fa-solid fa-link"></i>
                        <span>Copy Link</span>
                    </button>
                </div>
                <button class="close-modal-btn" onclick="closeShareModal()">Close</button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
