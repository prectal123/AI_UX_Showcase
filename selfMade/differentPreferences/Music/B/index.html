<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody - Music Share & Play</title>
    <meta name="description" content="Premium music sharing and playing experience with a focus on predictability and ease of use.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app-container" class="mobile-frame">
        <!-- Status Bar Mock -->
        <div class="status-bar">
            <span class="time" id="status-time">21:51</span>
            <div class="status-icons">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <!-- Main Content Area -->
        <main id="main-view">
            <!-- Content will be injected here by app.js -->
        </main>

        <!-- Mini Player (Always visible if music is playing) -->
        <div id="mini-player" class="mini-player hidden">
            <div class="mini-info" id="open-player">
                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=200&auto=format&fit=crop" alt="Album Art" id="mini-art">
                <div class="mini-text">
                    <div class="mini-title" id="mini-title">Song Title</div>
                    <div class="mini-artist" id="mini-artist">Artist Name</div>
                </div>
            </div>
            <div class="mini-controls">
                <button id="mini-play-btn" class="icon-btn"><i class="fas fa-play"></i></button>
                <button id="mini-next-btn" class="icon-btn"><i class="fas fa-forward"></i></button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="home" id="nav-home">
                <i class="fas fa-home"></i>
                <span>홈</span>
            </button>
            <button class="nav-item" data-view="search" id="nav-search">
                <i class="fas fa-search"></i>
                <span>검색</span>
            </button>
            <button class="nav-item" data-view="library" id="nav-library">
                <i class="fas fa-book-open"></i>
                <span>라이브러리</span>
            </button>
            <button class="nav-item" data-view="profile" id="nav-profile">
                <i class="fas fa-user"></i>
                <span>프로필</span>
            </button>
        </nav>

        <!-- Full Player View (Overlay) -->
        <div id="full-player" class="full-player overlay hidden">
            <div class="player-header">
                <button id="close-player" class="icon-btn" aria-label="Close Player"><i class="fas fa-chevron-down"></i></button>
                <div class="player-header-title">지금 재생 중</div>
                <button class="icon-btn" aria-label="More Options"><i class="fas fa-ellipsis-v"></i></button>
            </div>
            <div class="player-content">
                <div class="player-art-container">
                    <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=200&auto=format&fit=crop" alt="Album Art" id="player-art">
                </div>
                <div class="player-info">
                    <div class="player-track-info">
                        <h2 id="player-title">Song Title</h2>
                        <p id="player-artist">Artist Name</p>
                    </div>
                    <button class="icon-btn heart-btn" id="player-like" aria-label="Like"><i class="far fa-heart"></i></button>
                </div>
                <div class="player-progress">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-time">
                        <span id="current-time">0:00</span>
                        <span id="total-time">3:45</span>
                    </div>
                </div>
                <div class="player-controls">
                    <button class="icon-btn secondary-btn" id="shuffle-btn" aria-label="Shuffle"><i class="fas fa-shuffle"></i></button>
                    <button class="icon-btn main-btn" id="player-prev" aria-label="Previous"><i class="fas fa-step-backward"></i></button>
                    <button class="icon-btn play-pause-btn" id="player-play-btn" aria-label="Play/Pause"><i class="fas fa-play"></i></button>
                    <button class="icon-btn main-btn" id="player-next" aria-label="Next"><i class="fas fa-step-forward"></i></button>
                    <button class="icon-btn secondary-btn" id="repeat-btn" aria-label="Repeat"><i class="fas fa-repeat"></i></button>
                </div>
                <div class="player-footer">
                    <button class="icon-btn" id="share-btn" aria-label="Share"><i class="fas fa-share-nodes"></i></button>
                    <button class="icon-btn" id="queue-btn" aria-label="Queue"><i class="fas fa-list-ul"></i></button>
                </div>
            </div>
        </div>

        <!-- View Detail Overlay (for Playlists/Albums) -->
        <div id="detail-view" class="overlay hidden">
            <!-- Content will be injected here -->
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
