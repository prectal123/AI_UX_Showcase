<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비디오 쉐어 - 접근성 중심의 영상 플랫폼</title>
    <meta name="description" content="모두를 위한 쉽고 편리한 영상 공유 플랫폼 프로토타입입니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">본문 바로가기</a>

    <header>
        <div class="container header-inner">
            <a href="#" class="logo" id="home-btn" aria-label="비디오 쉐어 홈">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent);"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <span>비디오 쉐어</span>
            </a>

            <form class="search-bar" id="search-form" role="search">
                <span class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="search" id="search-input" placeholder="검색어를 입력하세요..." aria-label="영상 검색">
                <button type="submit" class="btn-primary" aria-label="검색 실행">검색</button>
            </form>

            <nav class="nav-actions" aria-label="사용자 메뉴">
                <button id="upload-btn" class="action-btn" aria-label="영상 업로드">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <span>업로드</span>
                </button>
                <button id="lib-btn" class="action-btn" aria-label="보관함">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    <span>보관함</span>
                </button>
                <button id="contrast-btn" class="action-btn" aria-label="고대비 모드 전환">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2v20"></path></svg>
                    <span>고대비</span>
                </button>
                <button id="profile-btn" class="action-btn" aria-label="내 프로필">
                    <img src="https://picsum.photos/id/64/44/44" alt="" class="creator-avatar" style="width: 32px; height: 32px; margin: 0;">
                    <span>프로필</span>
                </button>
            </nav>
        </div>
    </header>

    <main id="main-content" class="container">
        <!-- Views will be injected here by app.js -->
        <div id="view-home" class="view">
            <div class="video-grid" id="main-grid">
                <!-- Video cards go here -->
            </div>
        </div>

        <div id="view-detail" class="view hidden">
            <!-- Video detail view content -->
        </div>

        <div id="view-library" class="view hidden">
            <h1 style="margin-bottom: var(--spacing-lg);">나의 보관함</h1>
            <div class="video-grid" id="library-grid">
                <!-- User's saved/uploaded videos -->
            </div>
        </div>
    </main>

    <nav class="mobile-nav" aria-label="모바일 하단 네비게이션">
        <button class="nav-link icon-with-label" id="mob-home-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>홈</span>
        </button>
        <button class="nav-link icon-with-label" id="mob-lib-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            <span>보관함</span>
        </button>
        <button class="nav-link icon-with-label" id="mob-upload-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span>업로드</span>
        </button>
    </nav>

    <!-- Modal for Upload -->
    <div id="upload-modal" class="overlay hidden">
        <div class="modal fade-in">
            <h2 style="margin-bottom: var(--spacing-md);">영상 업로드</h2>
            <p style="margin-bottom: var(--spacing-lg); color: var(--text-secondary);">컴퓨터에서 파일을 끌어다 놓거나 선택하세요.</p>
            <div style="border: 2px dashed var(--border); padding: var(--spacing-xl); border-radius: var(--radius); text-align: center; margin-bottom: var(--spacing-lg);">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; opacity: 0.5;"><polyline points="16 16 12 12 8 16"></polyline><line x1="12" y1="12" x2="12" y2="21"></line><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path><polyline points="16 16 12 12 8 16"></polyline></svg>
                <p>파일 선택</p>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button id="close-upload-btn" class="action-btn">취소</button>
                <button class="btn-primary">업로드 시작</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>

    <!-- Floating Back to Portal Button -->
    <style>
        .back-to-portal-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }
        .back-to-portal-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #0f172a;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
    </style>
    <a href="../../../../../index.html" class="back-to-portal-btn">
        <span>🏠</span> Showcase Portal
    </a>

</body>
</html>
