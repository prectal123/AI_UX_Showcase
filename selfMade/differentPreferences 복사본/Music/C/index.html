<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeShare | Discover & Play</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header>
        <div class="logo" id="logo-home">
            <img src="assets/logo.png" alt="VibeShare">
            <span>VibeShare</span>
        </div>
        <div class="nav-actions">
            <button class="icon-btn active" id="nav-home" title="Home">
                <i data-lucide="home"></i>
            </button>
            <button class="icon-btn" id="nav-search" title="Search">
                <i data-lucide="search"></i>
            </button>
            <button class="icon-btn" id="nav-library" title="Library">
                <i data-lucide="library"></i>
            </button>
            <button class="icon-btn" id="nav-share" title="Share Music">
                <i data-lucide="plus-circle"></i>
            </button>
        </div>
    </header>

    <main id="app">
        <!-- Content will be injected here by app.js -->
        <section id="home-view">
            <h2>Trending Vibes</h2>
            <div class="music-grid" id="trending-grid">
                <!-- Mock tracks injected here -->
            </div>
        </section>

        <section id="search-view" class="hidden">
            <div class="search-container">
                <h2>Search</h2>
                <div class="search-input-wrapper">
                    <i data-lucide="search"></i>
                    <input type="text" class="search-bar" placeholder="Songs, artists, or vibes...">
                </div>
            </div>
            <div class="music-grid" id="search-results">
                <!-- Results here -->
            </div>
        </section>

        <section id="library-view" class="hidden">
            <h2>Your Library</h2>
            <div class="library-list" id="library-list">
                <!-- Library items here -->
            </div>
        </section>

        <section id="share-view" class="hidden">
            <h2>Share a Vibe</h2>
            <div class="share-form">
                <div class="form-group">
                    <label>Song Title</label>
                    <input type="text" placeholder="What's the track name?">
                </div>
                <div class="form-group">
                    <label>Artist</label>
                    <input type="text" placeholder="Who made it?">
                </div>
                <div class="form-group">
                    <label>Mood / Genre</label>
                    <select>
                        <option>Synthwave</option>
                        <option>Indie Folk</option>
                        <option>Dark Techno</option>
                        <option>Lo-fi</option>
                        <option>Pop</option>
                    </select>
                </div>
                <button class="submit-btn" id="post-vibe-btn">Post Vibe</button>
            </div>
        </section>
    </main>

    <!-- Persistent Player Bar -->
    <div class="player-bar">
        <div class="player-track-info">
            <img src="assets/cover1.png" id="player-art" alt="Album Art">
            <div>
                <div class="title" id="player-title">Synthetic Dreams</div>
                <div class="artist" id="player-artist">Stardust Reflections</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="control-btns">
                <button class="icon-btn"><i data-lucide="skip-back"></i></button>
                <div class="play-pause-btn" id="main-play-btn">
                    <i data-lucide="play" id="play-icon"></i>
                </div>
                <button class="icon-btn"><i data-lucide="skip-forward"></i></button>
            </div>
            <div class="progress-container">
                <span id="current-time">1:24</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="player-progress"></div>
                </div>
                <span id="total-time">3:45</span>
            </div>
        </div>
        <div class="player-extra">
            <button class="icon-btn"><i data-lucide="list-music"></i></button>
            <button class="icon-btn"><i data-lucide="volume-2"></i></button>
            <div class="volume-slider">
                <div class="volume-fill"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Action completed!</div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>

    <!-- Floating Back to Portal Button -->
    <style>
        .back-to-portal-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }
        .back-to-portal-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #0f172a;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
    </style>
    <a href="../../../../../index.html" class="back-to-portal-btn">
        <span>🏠</span> Showcase Portal
    </a>

</body>
</html>
