<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeEats | Premium Food Delivery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Critical styles to prevent layout shift */
        :root {
            --bg-color: #0c0c0c;
            --surface-color: #1a1a1a;
            --primary-color: #FFB300;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --header-height: 70px;
            --nav-height: 70px;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header id="main-header">
            <div class="header-content">
                <div class="location-picker" id="btn-location">
                    <span class="icon">📍</span>
                    <div class="location-info">
                        <span class="label">Delivering to</span>
                        <span class="address" id="current-address">123 Skyline Terrace, Luxury District</span>
                    </div>
                    <span class="chevron">▾</span>
                </div>
                <div class="user-actions">
                    <button id="btn-search-header" class="icon-btn" title="Search">🔍</button>
                    <button id="btn-profile-header" class="icon-btn" title="Profile">👤</button>
                </div>
            </div>
        </header>

        <main id="view-container">
            <!-- Content will be injected here -->
        </main>

        <div id="cart-peek-bar" class="hidden">
            <div class="cart-peek-content">
                <div class="cart-summary">
                    <span id="cart-count">0 items</span>
                    <div class="dot"></div>
                    <span id="cart-total">$0.00</span>
                </div>
                <button id="btn-view-cart" class="primary-btn">View Cart</button>
            </div>
        </div>

        <nav id="bottom-nav">
            <button class="nav-item active" data-view="home" id="nav-home">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-item" data-view="search" id="nav-search">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Search</span>
            </button>
            <button class="nav-item" data-view="orders" id="nav-orders">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Orders</span>
            </button>
            <button class="nav-item" data-view="profile" id="nav-profile">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </button>
        </nav>

        <div id="modal-overlay" class="hidden">
            <div id="modal-container">
                <button id="close-modal" class="close-btn">×</button>
                <div id="modal-content"></div>
            </div>
        </div>

        <div id="notification-container"></div>
    </div>

    <script src="app.js"></script>

    <!-- Floating Back to Portal Button -->
    <style>
        .back-to-portal-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
        }
        .back-to-portal-btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: #0f172a;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
    </style>
    <a href="../../../../../index.html" class="back-to-portal-btn">
        <span>🏠</span> Showcase Portal
    </a>

</body>
</html>
